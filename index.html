<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拼音闯关小勇士</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-stars"></div>
  <main class="app">
    <header class="topbar glass">
      <h1>🌈 拼音闯关小勇士</h1>
      <div class="stats">
        <span>关卡 <b id="level">1</b></span>
        <span>⭐ 分数 <b id="score">0</b></span>
        <span>❤️ 生命 <b id="lives">3</b></span>
      </div>
    </header>

    <section class="card glass">
      <p class="tip" id="tip">听声音，选出正确拼音！</p>
      <div class="challenge">
        <div class="emoji" id="emoji">🐱</div>
        <div class="word" id="word">猫</div>
      </div>
      <button class="speak-btn" id="speakBtn">🔊 读给我听</button>
      <div class="choices" id="choices"></div>
      <p class="feedback" id="feedback"></p>
      <button class="next-btn hidden" id="nextBtn">下一关 ➜</button>
    </section>

    <section class="progress glass">
      <div class="bar"><div class="bar-fill" id="barFill"></div></div>
      <p>通关进度：<span id="progressText">0 / 10</span></p>
    </section>
  </main>

  <div class="modal hidden" id="resultModal">
    <div class="modal-content glass">
      <h2 id="resultTitle"></h2>
      <p id="resultDesc"></p>
      <button id="restartBtn">再玩一次</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
